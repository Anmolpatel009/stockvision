[phases.setup]
# We include python311Packages.pip to ensure the pip binary is explicitly built
nixPkgs = ["python3", "python311Packages.pip", "nodejs_20", "stdenv", "libstdcxx5"]

[phases.install]
cmds = [
  "npm install",
  # Using 'python3 -m pip' is safer than just 'pip' as it guarantees 
  # the command is linked to the Python runtime we just installed.
  "python3 -m pip install --break-system-packages yfinance pandas numpy"
]

[phases.start]
# Double check: Is server.js inside the dashboard folder?
cmd = "node dashboard/server.js"