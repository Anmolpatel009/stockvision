[phases.setup]
# Syntax Fix: Must be an array ["a", "b"]
nixPkgs = ["python3", "python3Packages.pip", "nodejs_20"]

[phases.install]
cmds = [
  "npm install",
  # Installs your Quant-Kernel dependencies
  "pip install --break-system-packages -r dashboard/requirements.txt"
]

[phases.start]
# Points directly to your entry point
cmd = "node dashboard/server.js"