[phases.setup]
# We add stdenv and libstdcxx to provide the missing .so files
nixPkgs = ["python3", "python3Packages.pip", "nodejs_20", "stdenv", "libstdcxx5"]

[phases.install]
cmds = [
  "npm install",
  # We use the --break-system-packages flag for modern Debian/Nix environments
  "pip install --break-system-packages yfinance pandas numpy"
]

[phases.start]
# Absolute path to ensure the Node server finds the script
cmd = "node dashboard/server.js"